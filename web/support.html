<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Talk Shuffle アプリのサポート・お問い合わせ">
  <title>サポート - Talk Shuffle</title>
  <style>
    :root {
      --primary: #6750A4;
      --primary-container: #EADDFF;
      --on-primary: #FFFFFF;
      --on-surface: #1C1B1F;
      --on-surface-variant: #49454F;
      --outline: #79747E;
      --surface: #FEF7FF;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.7;
      color: var(--on-surface);
      background: var(--surface);
      margin: 0;
      padding: 2rem 1rem;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
    }
    h1 {
      font-size: 1.5rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }
    h2 {
      font-size: 1.1rem;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      color: var(--on-surface);
    }
    p {
      margin: 0.5rem 0;
      color: var(--on-surface-variant);
    }
    .app-name { font-weight: 600; }
    .contact-box {
      background: var(--primary-container);
      padding: 1rem 1.25rem;
      border-radius: 12px;
      margin: 1rem 0;
    }
    .contact-box p { margin: 0; color: var(--on-surface); }
    a {
      color: var(--primary);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    @media (prefers-color-scheme: dark) {
      :root {
        --primary: #D0BCFF;
        --primary-container: #4F378B;
        --on-surface: #E6E1E5;
        --on-surface-variant: #CAC4D0;
        --surface: #141218;
      }
    }
  </style>
</head>
<body>
  <h1>サポート</h1>
  <p class="app-name">Talk Shuffle</p>

  <h2>お問い合わせ</h2>
  <p>不具合の報告、機能のご要望、その他のお問い合わせは、以下までご連絡ください。</p>
  <div class="contact-box">
    <p><strong>メール:</strong> <a href="mailto:rushhirosan@gmail.com">rushhirosan@gmail.com</a></p>
  </div>

  <h2>よくある質問</h2>
  <p><strong>Q: アカウント登録は必要ですか？</strong></p>
  <p>A: いいえ、不要です。アプリを起動するだけでご利用いただけます。</p>

  <p><strong>Q: データはどこに保存されますか？</strong></p>
  <p>A: セッション履歴は端末内にのみ保存されます。外部サーバーへは送信されません。</p>

  <h2>関連リンク</h2>
  <p><a href="privacy.html">プライバシーポリシー</a></p>
</body>
</html>
